name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (pinned 2026-06-19)

      - name: Install Cyrius toolchain
        run: |
          set -e
          # The cyrius.cyml `[package].cyrius` pin is the single source of truth
          # for the toolchain version — no version is hardcoded in this YAML.
          # Read the pin and hand it to the UPSTREAM installer, which fetches +
          # lays out $HOME/.cyrius/{bin,lib}. A hand-rolled curl+tarball+cp breaks
          # `cyrius deps` pin-check — install.sh is the canonical path (patra is
          # the reference; install.sh does its own fetch verification).
          CYRIUS_VERSION="$(grep '^cyrius = ' cyrius.cyml | head -1 | sed 's/cyrius = "\(.*\)"/\1/')"
          echo "Installing Cyrius $CYRIUS_VERSION"
          curl -sSf https://raw.githubusercontent.com/MacCracken/cyrius/main/scripts/install.sh | \
            CYRIUS_VERSION="$CYRIUS_VERSION" sh
          echo "$HOME/.cyrius/bin" >> "$GITHUB_PATH"

      - name: Resolve deps
        run: cyrius deps

      - name: Lint
        # Hard gate: any `warn` line fails CI (matches patra / sigil). prajna's
        # src lints clean with zero warnings, so no per-file exemptions needed.
        run: |
          fail=0
          for f in src/*.cyr; do
            out=$(cyrius lint "$f" 2>&1 || true)
            echo "$out"
            if echo "$out" | grep -qE '^[[:space:]]*warn '; then
              echo "lint: warnings in $f"; fail=1
            fi
          done
          [ $fail -eq 0 ] || { echo "lint: warnings present"; exit 1; }

      - name: Build demo (DCE)
        run: |
          mkdir -p build
          CYRIUS_DCE=1 cyrius build src/main.cyr build/prajna
          echo "prajna: $(wc -c < build/prajna) bytes"

      - name: Verify ELF
        run: xxd -l 4 build/prajna | grep -q "7f45 4c46"

      - name: Unit tests
        # bare `cyrius test` runs the [build].test entry AND auto-discovers
        # tests/*.tcyr (the M1 second-order meta-gradient FD-gate assertions).
        run: cyrius test

      - name: Benchmarks
        run: |
          CYRIUS_DCE=1 cyrius build tests/prajna.bcyr build/bench
          ./build/bench

      - name: Fuzz
        run: |
          CYRIUS_DCE=1 cyrius build tests/prajna.fcyr build/fuzz
          timeout 10 ./build/fuzz || { echo "FUZZ CRASH"; exit 1; }

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (pinned 2026-06-19)
      - name: Scan for dangerous patterns
        run: |
          WARN=0
          if grep -rn 'syscall(59' src/ 2>/dev/null | grep -v "# "; then
            echo "WARN: raw execve"; WARN=1
          fi
          if grep -rn '"/etc/' src/ 2>/dev/null; then
            echo "WARN: hardcoded /etc paths"; WARN=1
          fi
          echo "security scan complete (warnings: $WARN)"

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4 (pinned 2026-06-19)
      - name: Check required docs
        run: |
          MISSING=0
          for doc in README.md CHANGELOG.md VERSION LICENSE cyrius.cyml; do
            if [ -f "$doc" ]; then echo "  OK: $doc"; else echo "  MISSING: $doc"; MISSING=1; fi
          done
          exit $MISSING
      - name: Verify version consistency
        run: |
          FILE_VERSION=$(cat VERSION | tr -d '[:space:]')
          CYML_RAW=$(grep '^version = ' cyrius.cyml | head -1 | sed 's/version = "\(.*\)"/\1/')
          # ${file:VERSION} means cyml derives the version from the VERSION file
          # (the single source of truth) — resolve the template for the check.
          if [ "$CYML_RAW" = "\${file:VERSION}" ]; then
            CYML_VERSION="$FILE_VERSION"
          else
            CYML_VERSION="$CYML_RAW"
          fi
          [ "$FILE_VERSION" = "$CYML_VERSION" ] || { echo "VERSION ($FILE_VERSION) != cyrius.cyml ($CYML_RAW)"; exit 1; }
          grep -q "$FILE_VERSION" CHANGELOG.md || { echo "version not in changelog"; exit 1; }
          echo "Version consistent: $FILE_VERSION (cyml: $CYML_RAW)"
